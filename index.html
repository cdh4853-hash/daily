<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>daily-check</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e2e0d8;
    --text-primary: #1a1917;
    --text-secondary: #6b6960;
    --text-muted: #a09e96;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --accent-border: #bfdbfe;
    --danger: #dc2626;
    --danger-light: #fef2f2;
    --success: #16a34a;
    --success-light: #f0fdf4;
    --warn: #d97706;
    --warn-light: #fffbeb;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  /* ── 로그인/가입 공통 ── */
  #auth-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 28px;
    width: 100%;
    max-width: 380px;
    box-shadow: var(--shadow-md);
  }
  .app-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 18px; font-weight: 700; letter-spacing: -1px;
    flex-shrink: 0;
  }
  .app-name { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .app-desc { font-size: 13px; color: var(--text-muted); margin-top: 1px; }

  /* 탭 */
  .auth-tabs {
    display: flex;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin-bottom: 24px;
  }
  .auth-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-family: inherit;
    transition: all 0.15s;
  }
  .auth-tab.active {
    background: var(--accent);
    color: white;
  }

  /* 폼 */
  .auth-panel { display: none; }
  .auth-panel.active { display: block; }
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block; font-size: 13px; font-weight: 600;
    color: var(--text-secondary); margin-bottom: 6px;
  }
  .form-input {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 15px; color: var(--text-primary);
    background: var(--surface); outline: none;
    transition: border-color 0.15s; font-family: inherit;
  }
  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
  }
  .btn-primary {
    width: 100%; padding: 13px;
    background: var(--accent); color: white;
    border: none; border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit; margin-top: 6px;
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-primary:disabled { background: var(--text-muted); cursor: not-allowed; }
  .auth-msg {
    display: none;
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 13px;
    margin-top: 12px;
  }
  .auth-msg.error {
    background: var(--danger-light);
    border: 1px solid #fca5a5;
    color: var(--danger);
  }
  .auth-msg.success {
    background: var(--success-light);
    border: 1px solid #86efac;
    color: var(--success);
  }
  .master-hint {
    font-size: 12px; color: var(--text-muted);
    text-align: center; margin-top: 14px;
  }

  /* ── 메인 화면 ── */
  #main-screen { display: none; min-height: 100vh; }
  .top-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .top-bar-left { display: flex; align-items: center; gap: 8px; }
  .top-logo {
    width: 30px; height: 30px; background: var(--accent);
    border-radius: 7px; display: flex; align-items: center;
    justify-content: center; color: white; font-size: 13px; font-weight: 700;
  }
  .top-title { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
  .work-date-badge {
    background: var(--accent-light); border: 1px solid var(--accent-border);
    color: var(--accent); font-size: 12px; font-weight: 600;
    padding: 3px 9px; border-radius: 20px;
  }
  .user-area { display: flex; align-items: center; gap: 8px; }
  .user-name-top { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .user-role-top { font-size: 11px; color: var(--text-muted); }
  .btn-logout {
    padding: 6px 11px;
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    background: transparent; font-size: 13px; color: var(--text-secondary);
    cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.15s;
  }
  .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

  .main-content { padding: 18px 16px; max-width: 680px; margin: 0 auto; }
  .section-header { margin-bottom: 12px; }
  .section-title { font-size: 17px; font-weight: 700; letter-spacing: -0.4px; }
  .section-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  /* 팀 그리드 */
  .team-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 24px;
  }
  @media (min-width: 480px) { .team-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 640px) { .team-grid { grid-template-columns: repeat(4, 1fr); } }

  .team-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 12px;
    cursor: pointer; transition: all 0.15s;
    text-decoration: none; display: block;
    position: relative; overflow: hidden;
  }
  .team-card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent); opacity: 0; transition: opacity 0.15s;
  }
  .team-card:hover { border-color: var(--accent); box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .team-card:hover::before { opacity: 1; }
  .team-card:active { transform: scale(0.97); }
  .team-emoji { font-size: 26px; margin-bottom: 8px; display: block; line-height: 1; }
  .team-name { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
  .team-progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
  .team-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s; }
  .team-progress-fill.complete { background: var(--success); }
  .team-progress-fill.has-issue { background: var(--danger); }
  .team-progress-text { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .team-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; margin-top: 4px; }
  .badge-issue { background: var(--danger-light); color: var(--danger); }
  .badge-complete { background: var(--success-light); color: var(--success); }
  .badge-pending { background: var(--warn-light); color: var(--warn); }

  /* 이상사항 */
  .issue-list { display: flex; flex-direction: column; gap: 8px; }
  .issue-item {
    background: var(--surface); border: 1.5px solid #fca5a5;
    border-radius: var(--radius-sm); padding: 12px 14px;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .issue-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); flex-shrink: 0; margin-top: 5px; }
  .issue-content { flex: 1; min-width: 0; }
  .issue-item-name { font-size: 13px; font-weight: 600; }
  .issue-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .issue-memo { font-size: 12px; color: var(--danger); margin-top: 3px; font-style: italic; }

  /* 하단 메뉴 버튼 */
  .btn-menu {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px; background: var(--surface);
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600; color: var(--text-secondary);
    cursor: pointer; text-decoration: none; transition: all 0.15s;
    font-family: inherit; width: 100%; margin-bottom: 10px;
  }
  .btn-menu:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  /* 스켈레톤 */
  .skeleton {
    background: linear-gradient(90deg, var(--border) 25%, #f0efea 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  .empty-state { text-align: center; padding: 36px 20px; color: var(--text-muted); grid-column: 1/-1; }
  .empty-state-icon { font-size: 36px; margin-bottom: 10px; }
  .empty-state-text { font-size: 14px; line-height: 1.6; }

  /* 토스트 */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text-primary); color: white;
    padding: 12px 20px; border-radius: 30px;
    font-size: 14px; font-weight: 500; z-index: 999;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ═══════════════════════════════════
     로그인 / 회원가입 화면
═══════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="app-logo">
      <div class="logo-icon">dc</div>
      <div>
        <div class="app-name">daily-check</div>
        <div class="app-desc">일일 체크리스트</div>
      </div>
    </div>

    <!-- 탭 -->
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">로그인</button>
      <button class="auth-tab" onclick="switchTab('register')">회원가입</button>
    </div>

    <!-- 로그인 패널 -->
    <div class="auth-panel active" id="panel-login">
      <div class="form-group">
        <label class="form-label">이름</label>
        <input class="form-input" type="text" id="login-name" placeholder="가입 시 등록한 이름" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input class="form-input" type="password" id="login-pw" placeholder="비밀번호 입력" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="login-btn" onclick="handleLogin()">로그인</button>
      <div class="auth-msg error" id="login-error"></div>
      <div style="text-align:center;margin-top:14px;">
        <button onclick="switchTab('changepw')" style="background:none;border:none;font-size:13px;color:var(--text-muted);cursor:pointer;font-family:inherit;text-decoration:underline;padding:0;">비밀번호를 잊으셨나요?</button>
      </div>
    </div>

    <!-- 회원가입 패널 -->
    <div class="auth-panel" id="panel-register">
      <div class="form-group">
        <label class="form-label">이름 <span style="color:var(--danger)">*</span></label>
        <input class="form-input" type="text" id="reg-name" placeholder="본인 이름 입력">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호 <span style="color:var(--danger)">*</span></label>
        <input class="form-input" type="password" id="reg-pw" placeholder="비밀번호 설정 (6자 이상)">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호 확인 <span style="color:var(--danger)">*</span></label>
        <input class="form-input" type="password" id="reg-pw2" placeholder="비밀번호 재입력">
      </div>
      <div class="form-group">
        <label class="form-label">마스터 코드 <span style="color:var(--danger)">*</span></label>
        <input class="form-input" type="password" id="reg-master" placeholder="관리자에게 문의하세요">
      </div>
      <button class="btn-primary" id="reg-btn" onclick="handleRegister()">가입하기</button>
      <div class="auth-msg error" id="reg-error"></div>
      <div class="auth-msg success" id="reg-success"></div>
      <div class="master-hint">마스터 코드를 모르시면 관리자에게 문의하세요</div>
    </div>

    <!-- 비밀번호 재설정 패널 (마스터코드 방식) -->
    <div class="auth-panel" id="panel-changepw">
      <div style="background:var(--warn-light);border:1px solid #fcd34d;border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;color:var(--warn);margin-bottom:16px;">
        마스터 코드를 사용해 비밀번호를 재설정합니다
      </div>
      <div class="form-group">
        <label class="form-label">이름 <span style="color:var(--danger)">*</span></label>
        <input class="form-input" type="text" id="cp-name" placeholder="가입 시 등록한 이름">
      </div>
      <div class="form-group">
        <label class="form-label">마스터 코드 <span style="color:var(--danger)">*</span></label>
        <input class="form-input" type="password" id="cp-master" placeholder="관리자에게 문의하세요">
      </div>
      <div class="form-group">
        <label class="form-label">새 비밀번호 <span style="color:var(--danger)">*</span></label>
        <input class="form-input" type="password" id="cp-new" placeholder="새 비밀번호 (6자 이상)">
      </div>
      <div class="form-group">
        <label class="form-label">새 비밀번호 확인 <span style="color:var(--danger)">*</span></label>
        <input class="form-input" type="password" id="cp-new2" placeholder="새 비밀번호 재입력">
      </div>
      <button class="btn-primary" id="cp-btn" onclick="handleResetPw()">비밀번호 재설정</button>
      <div class="auth-msg error" id="cp-error"></div>
      <div class="auth-msg success" id="cp-success"></div>
      <div style="text-align:center;margin-top:14px;">
        <button onclick="switchTab('login')" style="background:none;border:none;font-size:13px;color:var(--text-muted);cursor:pointer;font-family:inherit;text-decoration:underline;padding:0;">← 로그인으로 돌아가기</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════
     메인 화면
═══════════════════════════════════ -->
<div id="main-screen">
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="top-logo">dc</div>
      <div class="top-title">daily-check</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
      <span class="work-date-badge" id="work-date-badge">-</span>
      <div class="user-area">
        <div style="text-align:right;">
          <div class="user-name-top" id="user-name-display">-</div>
          <div class="user-role-top" id="user-role-display">-</div>
        </div>
        <button class="btn-logout" onclick="openSettings()" style="margin-right:4px;">설정</button>
        <button class="btn-logout" onclick="handleLogout()">로그아웃</button>
      </div>
    </div>
  </div>

  <div class="main-content">
    <!-- 팀 선택 -->
    <div class="section-header" style="margin-top:4px;">
      <div class="section-title">팀 선택</div>
      <div class="section-sub">팀을 선택해 오늘의 체크리스트를 작성하세요</div>
    </div>
    <div class="team-grid" id="team-grid">
      <div class="team-card skeleton" style="height:108px;"></div>
      <div class="team-card skeleton" style="height:108px;"></div>
      <div class="team-card skeleton" style="height:108px;"></div>
      <div class="team-card skeleton" style="height:108px;"></div>
    </div>

    <!-- 오늘 이상사항 -->
    <div id="issue-section" style="display:none;margin-bottom:24px;">
      <div class="section-header">
        <div class="section-title" style="color:var(--danger);">⚠ 오늘 이상사항</div>
        <div class="section-sub">N 체크된 항목만 표시됩니다</div>
      </div>
      <div class="issue-list" id="issue-list"></div>
    </div>

    <!-- 관리자 메뉴 -->
    <div id="admin-section" style="display:none;margin-bottom:8px;">
      <div class="section-header">
        <div class="section-title">관리자</div>
      </div>
      <a href="admin.html" class="btn-menu">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
        팀 · 템플릿 관리
      </a>
    </div>

    <!-- 기록 조회 -->
    <div style="margin-bottom:40px;">
      <a href="history.html" class="btn-menu">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        최근 기록 조회 (30일)
      </a>
    </div>
  </div>
</div>

<!-- 설정 모달 -->
<div id="settings-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;align-items:center;justify-content:center;padding:24px;">
  <div style="background:var(--surface);border-radius:20px;padding:28px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.15);">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <div style="font-size:17px;font-weight:700;">설정</div>
      <button onclick="closeSettings()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);padding:0;line-height:1;">✕</button>
    </div>

    <div style="font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:12px;">비밀번호 변경</div>

    <div class="form-group">
      <label class="form-label">현재 비밀번호</label>
      <input class="form-input" type="password" id="s-old" placeholder="현재 비밀번호">
    </div>
    <div class="form-group">
      <label class="form-label">새 비밀번호</label>
      <input class="form-input" type="password" id="s-new" placeholder="새 비밀번호 (6자 이상)">
    </div>
    <div class="form-group" style="margin-bottom:20px;">
      <label class="form-label">새 비밀번호 확인</label>
      <input class="form-input" type="password" id="s-new2" placeholder="새 비밀번호 재입력">
    </div>

    <div class="auth-msg error" id="s-error" style="margin-bottom:12px;"></div>
    <div class="auth-msg success" id="s-success" style="margin-bottom:12px;"></div>

    <button class="btn-primary" id="s-btn" onclick="handleSettingsPw()" style="margin-top:0;">비밀번호 변경</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Supabase ──────────────────────────────────
const SUPABASE_URL = 'https://flevmhcogrwagyoxcacs.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZsZXZtaGNvZ3J3YWd5b3hjYWNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDk5ODAsImV4cCI6MjA4NzkyNTk4MH0.eWvh1kjdnG-juv77MMbnmnRSWa22eFP0sZn9r4wHsYg';
const MASTER_CODE = 'momos1!';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── 탭 전환 ──────────────────────────────────
function switchTab(tab) {
  // 탭 버튼은 login/register 2개만
  const tabNames = ['login', 'register'];
  document.querySelectorAll('.auth-tab').forEach((el, i) => {
    el.classList.toggle('active', tabNames[i] === tab);
  });
  // 패널은 changepw 포함 3개
  ['login', 'register', 'changepw'].forEach(t => {
    const panel = document.getElementById('panel-' + t);
    if (panel) panel.classList.toggle('active', t === tab);
  });
}

// ── 작업일 계산 (서울 04:00 기준) ─────────────
function getWorkDate() {
  const now = new Date();
  const seoul = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
  if (seoul.getHours() < 4) seoul.setDate(seoul.getDate() - 1);
  const y = seoul.getFullYear();
  const m = String(seoul.getMonth() + 1).padStart(2, '0');
  const d = String(seoul.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}
function getWorkDateLabel(dateStr) {
  const [y, m, d] = dateStr.split('-');
  const days = ['일','월','화','수','목','금','토'];
  const dt = new Date(Number(y), Number(m)-1, Number(d));
  return `${m}월 ${d}일 (${days[dt.getDay()]})`;
}

// ── 토스트 ────────────────────────────────────
function showToast(msg, duration = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// ── 이름 → 내부 이메일 변환 ─────────────────
// Supabase Auth는 이메일 기반이므로 이름을 이메일 형식으로 내부 변환
function nameToEmail(name) {
  const slug = name.trim()
    .replace(/\s+/g, '.')
    .replace(/[^a-zA-Z0-9가-힣._-]/g, '');
  return slug + '@daily-check.internal';
}

// ── 회원가입 ──────────────────────────────────
async function handleRegister() {
  const name    = document.getElementById('reg-name').value.trim();
  const pw      = document.getElementById('reg-pw').value;
  const pw2     = document.getElementById('reg-pw2').value;
  const master  = document.getElementById('reg-master').value;
  const errEl   = document.getElementById('reg-error');
  const okEl    = document.getElementById('reg-success');
  const btn     = document.getElementById('reg-btn');

  errEl.style.display = 'none';
  okEl.style.display = 'none';

  // 유효성 검사
  if (!name)            return showErr(errEl, '이름을 입력해주세요.');
  if (pw.length < 6)    return showErr(errEl, '비밀번호는 6자 이상이어야 합니다.');
  if (pw !== pw2)       return showErr(errEl, '비밀번호가 일치하지 않습니다.');
  if (master !== MASTER_CODE) return showErr(errEl, '마스터 코드가 올바르지 않습니다.');

  btn.disabled = true;
  btn.textContent = '처리 중...';

  const email = nameToEmail(name);

  // 1) Auth 가입
  const { data, error } = await sb.auth.signUp({ email, password: pw,
    options: { data: { name } }
  });

  if (error) {
    // 이미 존재하는 이름
    if (error.message.includes('already registered') || error.message.includes('already been registered')) {
      showErr(errEl, '이미 사용 중인 이름입니다. 다른 이름을 사용해주세요.');
    } else {
      showErr(errEl, '가입 중 오류가 발생했습니다: ' + error.message);
    }
    btn.disabled = false;
    btn.textContent = '가입하기';
    return;
  }

  // 2) daily_profiles 직접 upsert (트리거 백업)
  if (data.user) {
    await sb.from('daily_profiles').upsert({
      id: data.user.id,
      name: name,
      role: 'member'
    }, { onConflict: 'id' });
  }

  okEl.textContent = `✓ "${name}" 계정이 생성되었습니다! 로그인 탭에서 이름과 비밀번호로 로그인하세요.`;
  okEl.style.display = 'block';
  btn.disabled = false;
  btn.textContent = '가입하기';

  // 입력 초기화
  ['reg-name','reg-pw','reg-pw2','reg-master'].forEach(id => {
    document.getElementById(id).value = '';
  });

  // 3초 후 로그인 탭으로 자동 이동
  setTimeout(() => switchTab('login'), 3000);
}

function showErr(el, msg) {
  el.textContent = msg;
  el.style.display = 'block';
}

// ── 로그인 ────────────────────────────────────
async function handleLogin() {
  const name = document.getElementById('login-name').value.trim();
  const pw   = document.getElementById('login-pw').value;
  const errEl = document.getElementById('login-error');
  const btn   = document.getElementById('login-btn');

  errEl.style.display = 'none';
  if (!name || !pw) return showErr(errEl, '이름과 비밀번호를 입력해주세요.');

  btn.disabled = true;
  btn.textContent = '로그인 중...';

  const email = nameToEmail(name);
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });

  if (error) {
    showErr(errEl, '이름 또는 비밀번호가 올바르지 않습니다.');
    btn.disabled = false;
    btn.textContent = '로그인';
    return;
  }

  await initMainScreen(data.user);
}

// ── 비밀번호 재설정 (마스터코드 방식) ──────────
async function handleResetPw() {
  const name   = document.getElementById('cp-name').value.trim();
  const master = document.getElementById('cp-master').value;
  const newPw  = document.getElementById('cp-new').value;
  const newPw2 = document.getElementById('cp-new2').value;
  const errEl  = document.getElementById('cp-error');
  const okEl   = document.getElementById('cp-success');
  const btn    = document.getElementById('cp-btn');

  errEl.style.display = 'none';
  okEl.style.display  = 'none';

  if (!name)             return showErr(errEl, '이름을 입력해주세요.');
  if (!master)           return showErr(errEl, '마스터 코드를 입력해주세요.');
  if (newPw.length < 6)  return showErr(errEl, '새 비밀번호는 6자 이상이어야 합니다.');
  if (newPw !== newPw2)  return showErr(errEl, '새 비밀번호가 일치하지 않습니다.');

  btn.disabled = true;
  btn.textContent = '처리 중...';

  // Supabase DB Function 호출
  const { data, error } = await sb.rpc('reset_password_by_master', {
    p_name:   name,
    p_master: master,
    p_new_pw: newPw
  });

  btn.disabled = false;
  btn.textContent = '비밀번호 재설정';

  if (error) {
    showErr(errEl, '오류가 발생했습니다. 다시 시도해주세요.');
    return;
  }

  if (!data.success) {
    showErr(errEl, data.message);
    return;
  }

  okEl.textContent = '✓ ' + data.message + ' 로그인 탭에서 새 비밀번호로 로그인하세요.';
  okEl.style.display = 'block';
  ['cp-name','cp-master','cp-new','cp-new2'].forEach(id => {
    document.getElementById(id).value = '';
  });
  setTimeout(() => switchTab('login'), 3000);
}

// 엔터키 지원
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('panel-login').classList.contains('active'))    handleLogin();
  else if (document.getElementById('panel-register').classList.contains('active')) handleRegister();
  else if (document.getElementById('panel-changepw').classList.contains('active')) handleResetPw();
});

// ── 로그아웃 ──────────────────────────────────
async function handleLogout() {
  await sb.auth.signOut();
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('login-name').value = '';
  document.getElementById('login-pw').value = '';
}

// ── 메인 화면 초기화 ──────────────────────────
async function initMainScreen(user) {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';

  const workDate = getWorkDate();
  document.getElementById('work-date-badge').textContent = getWorkDateLabel(workDate);

  // 프로필 로드
  const { data: profile } = await sb
    .from('daily_profiles')
    .select('name, role')
    .eq('id', user.id)
    .single();

  const userName = profile?.name || user.user_metadata?.name || '사용자';
  const userRole = profile?.role || 'member';

  document.getElementById('user-name-display').textContent = userName;
  document.getElementById('user-role-display').textContent = userRole === 'admin' ? '관리자' : '팀원';

  if (userRole === 'admin') {
    document.getElementById('admin-section').style.display = 'block';
  }

  await loadTeams(workDate);
  await loadTodayIssues(workDate);
}

// ── 팀 목록 ──────────────────────────────────
const TEAM_EMOJIS = { '2차생산팀':'🏭','1차생산팀':'☕','완제품생산팀':'📦','전산팀':'💻' };

async function loadTeams(workDate) {
  const grid = document.getElementById('team-grid');

  const { data: teams, error } = await sb
    .from('daily_teams')
    .select('id, name')
    .order('sort_order', { ascending: true });

  if (error || !teams || teams.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">🏢</div>
      <div class="empty-state-text">등록된 팀이 없습니다.<br>관리자에게 팀 추가를 요청하세요.</div>
    </div>`;
    return;
  }

  const teamIds = teams.map(t => t.id);
  const { data: checklists } = await sb
    .from('daily_checklists')
    .select('id, team_id, daily_checklist_items(id, status)')
    .in('team_id', teamIds)
    .eq('work_date', workDate);

  const progressMap = {};
  (checklists || []).forEach(cl => {
    const items = cl.daily_checklist_items || [];
    progressMap[cl.team_id] = {
      total: items.length,
      done: items.filter(i => i.status !== 'pending').length,
      hasIssue: items.some(i => i.status === 'N')
    };
  });

  grid.innerHTML = teams.map(team => {
    const prog = progressMap[team.id];
    const emoji = TEAM_EMOJIS[team.name] || '🏢';
    let barHTML = '', badgeHTML = '';

    if (prog && prog.total > 0) {
      const pct = Math.round((prog.done / prog.total) * 100);
      const cls = prog.hasIssue ? 'has-issue' : prog.done === prog.total ? 'complete' : '';
      barHTML = `<div class="team-progress-bar"><div class="team-progress-fill ${cls}" style="width:${pct}%"></div></div>
                 <div class="team-progress-text">${prog.done}/${prog.total} 완료</div>`;
      badgeHTML = prog.hasIssue
        ? '<span class="team-badge badge-issue">이상있음</span>'
        : prog.done === prog.total
          ? '<span class="team-badge badge-complete">완료</span>'
          : '<span class="team-badge badge-pending">진행중</span>';
    } else {
      barHTML = `<div class="team-progress-bar"><div class="team-progress-fill" style="width:0%"></div></div>
                 <div class="team-progress-text">미시작</div>`;
      badgeHTML = '<span class="team-badge badge-pending">미시작</span>';
    }

    return `<a class="team-card" href="checklist.html?team=${team.id}&date=${workDate}">
      <span class="team-emoji">${emoji}</span>
      <div class="team-name">${team.name}</div>
      ${barHTML}${badgeHTML}
    </a>`;
  }).join('');
}

// ── 오늘 이상사항 ─────────────────────────────
async function loadTodayIssues(workDate) {
  const { data: issues } = await sb
    .from('daily_checklist_items')
    .select('item_name, memo, daily_checklists!inner(work_date, daily_teams(name)), daily_profiles(name)')
    .eq('status', 'N')
    .eq('daily_checklists.work_date', workDate)
    .order('checked_at', { ascending: false })
    .limit(10);

  if (!issues || issues.length === 0) return;

  document.getElementById('issue-section').style.display = 'block';
  document.getElementById('issue-list').innerHTML = issues.map(item => {
    const teamName = item.daily_checklists?.daily_teams?.name || '-';
    const checker  = item.daily_profiles?.name || '-';
    return `<div class="issue-item">
      <div class="issue-dot"></div>
      <div class="issue-content">
        <div class="issue-item-name">[${teamName}] ${item.item_name}</div>
        <div class="issue-meta">작성자: ${checker}</div>
        ${item.memo ? `<div class="issue-memo">"${item.memo}"</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── 설정 모달 ─────────────────────────────────
function openSettings() {
  const modal = document.getElementById('settings-modal');
  modal.style.display = 'flex';
  ['s-old','s-new','s-new2'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('s-error').style.display = 'none';
  document.getElementById('s-success').style.display = 'none';
}
function closeSettings() {
  document.getElementById('settings-modal').style.display = 'none';
}
// 모달 바깥 클릭 시 닫기
document.getElementById('settings-modal')?.addEventListener('click', function(e) {
  if (e.target === this) closeSettings();
});

async function handleSettingsPw() {
  const oldPw  = document.getElementById('s-old').value;
  const newPw  = document.getElementById('s-new').value;
  const newPw2 = document.getElementById('s-new2').value;
  const errEl  = document.getElementById('s-error');
  const okEl   = document.getElementById('s-success');
  const btn    = document.getElementById('s-btn');

  errEl.style.display = 'none';
  okEl.style.display  = 'none';

  if (!oldPw)            return showErr(errEl, '현재 비밀번호를 입력해주세요.');
  if (newPw.length < 6)  return showErr(errEl, '새 비밀번호는 6자 이상이어야 합니다.');
  if (newPw !== newPw2)  return showErr(errEl, '새 비밀번호가 일치하지 않습니다.');
  if (oldPw === newPw)   return showErr(errEl, '현재 비밀번호와 새 비밀번호가 같습니다.');

  btn.disabled = true;
  btn.textContent = '처리 중...';

  // 현재 세션 유저의 이메일로 재인증
  const { data: { user } } = await sb.auth.getUser();
  const { error: loginErr } = await sb.auth.signInWithPassword({
    email: user.email, password: oldPw
  });

  if (loginErr) {
    showErr(errEl, '현재 비밀번호가 올바르지 않습니다.');
    btn.disabled = false; btn.textContent = '비밀번호 변경';
    return;
  }

  const { error: updateErr } = await sb.auth.updateUser({ password: newPw });

  if (updateErr) {
    showErr(errEl, '변경 실패: ' + updateErr.message);
    btn.disabled = false; btn.textContent = '비밀번호 변경';
    return;
  }

  okEl.textContent = '✓ 비밀번호가 변경되었습니다!';
  okEl.style.display = 'block';
  btn.disabled = false; btn.textContent = '비밀번호 변경';
  ['s-old','s-new','s-new2'].forEach(id => document.getElementById(id).value = '');
  setTimeout(() => closeSettings(), 2000);
}

// ── 앱 시작 ──────────────────────────────────
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) await initMainScreen(session.user);
})();
</script>
